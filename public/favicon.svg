<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <clipPath id="roundlogo">
      <circle cx="16" cy="16" r="16" />
    </clipPath>
  </defs>
  <g clip-path="url(#roundlogo)">
    <image
      href="/logo.png"
      width="32"
      height="32"
      preserveAspectRatio="xMidYMid slice"
    />
  </g>
  <circle
    cx="16"
    cy="16"
    r="15"
    fill="none"
    stroke="#c9a227"
    stroke-width="1.5"
  />
</svg>
